source-file ~/.config/tmux/tmux.reset.conf
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set-option -g status-position top
set -g default-shell /bin/zsh
set -g default-command /bin/zsh

set -g xterm-keys on
set -sg repeat-time 300
set -s focus-events on
set -g mouse on
set -sg exit-empty on

set -g prefix M-a
set -g detach-on-destroy off     # don't exit from tmux when closing a session

set -q -g status-utf8 on
setw -q -g utf8 on

set -g visual-activity off
setw -g monitor-activity off
setw -g monitor-bell off

set -g history-limit 1000000     # increase history size (from 2,000)

# display
set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

set -g set-clipboard on          # use system clipboard
set -ag terminal-overrides ',*:Ms=\E]52;c;%p2%s\7'  # OSC52 clipboard passthrough (mosh + ghostty)
setw -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="f"

set -g display-panes-time 2000  # Show pane numbers for 2000ms (2 seconds)
set -g display-time 2000        # Show tmux messages for 2 seconds

# recognise extended keys
set -s extended-keys on
set -as terminal-features 'xterm-kitty*:extkeys'

# Undercurl
# NOTE: previously had `set -g default-terminal "${TERM}"` here, but if tmux
# server starts without TERM in the env (e.g. via systemd, ssh -T, ntm spawn),
# this overwrites line 2's `xterm-256color` with empty string, which breaks
# zsh-autosuggest + fast-syntax-highlight (double-render "lala" bug).
# tmux 3.6+ ALSO rejects empty default-terminal → ZLE redraw breaks → typing
# appears doubled in pane (visual only). Removed 2026-04-27.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '$HOME/.config'
set -g @sessionx-x-path '$HOME/.config'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# catppuccin theme 
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Status line settings
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g allow-passthrough on
set -s escape-time 0

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

run '~/.config/tmux/plugins/tpm/tpm'

# NTM Command Palette (overrides `ntm bind` default — F6 needs Fn modifier on Mac).
# Primary bind: `Prefix + Space` (mnemonic, single chord, Mac + Linux friendly).
# Fallback: F6 still works for hosts that prefer it (or `ntm bind` re-add).
if-shell 'command -v ntm >/dev/null 2>&1' \
    "bind-key Space display-popup -E -w 90% -h 90% 'ntm palette' ; \
     bind-key -n F6 display-popup -E -w 90% -h 90% 'ntm palette'"

# Clipboard auto-copy on mouse-drag / y-yank — host-conditional pipe target.
# Mac: native pbcopy. Non-Mac: pipe to bin/pbproxy with the current client PID
# so pbproxy can read /proc/<pid>/environ for SSH_CONNECTION and ship the
# clipboard to whichever Mac initiated the drag (mini / m2 / m3 / ...).
# Placed AFTER tpm run line so this overrides tmux-yank plugin (which auto-
# binds wl-copy on Linux — fails silently on headless tty hosts).
if-shell "[ \"$(uname)\" = Darwin ]" \
    "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy ; \
     bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy" \
    "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear '~/.config/tmux/bin/pbproxy copy #{client_pid}' ; \
     bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '~/.config/tmux/bin/pbproxy copy #{client_pid}'"
